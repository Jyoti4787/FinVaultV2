x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
  RabbitMQ__Host: rabbitmq
  RabbitMQ__Username: ${RABBITMQ_USERNAME:-guest}
  RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
  Jwt__Secret: ${JWT_SECRET:-FinVault-Super-Secret-Key-Must-Be-32-Chars!!}
  Jwt__Issuer: ${JWT_ISSUER:-https://finvault.io}

x-sql-depends: &sql-depends
  sqlserver:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

services:

  # ── INFRASTRUCTURE ────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: finvault-sqlserver
    environment:
      SA_PASSWORD: "Jyoti@Strong123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Jyoti@Strong123' -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 15

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: finvault-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MICROSERVICES (4 CORE SERVICES) ──────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: src/services/identity-service/FinVault.IdentityService.API/Dockerfile
    container_name: finvault-identity
    ports:
      - "5232:8080"
    environment:
      <<: *common-env
      ConnectionStrings__IdentityDb: "Server=sqlserver,1433;Database=finvault_identity;User Id=${DB_USERNAME};Password=${DB_PASSWORD};TrustServerCertificate=True"
      ProfilePictures__BaseUrl: "http://localhost:5232"
    depends_on: *sql-depends

  card-service:
    build:
      context: .
      dockerfile: src/services/card-service/FinVault.CardService.API/Dockerfile
    container_name: finvault-cards
    ports:
      - "5121:8080"
    environment:
      <<: *common-env
      ConnectionStrings__CardDb: "Server=sqlserver,1433;Database=finvault_cards;User Id=${DB_USERNAME};Password=${DB_PASSWORD};TrustServerCertificate=True"
    depends_on: *sql-depends

  payment-service:
    build:
      context: .
      dockerfile: src/services/payment-service/FinVault.PaymentService.API/Dockerfile
    container_name: finvault-payments
    ports:
      - "5181:8080"
    environment:
      <<: *common-env
      ConnectionStrings__PaymentDb: "Server=sqlserver,1433;Database=finvault_payments;User Id=${DB_USERNAME};Password=${DB_PASSWORD};TrustServerCertificate=True"
    depends_on: *sql-depends

  notification-service:
    build:
      context: .
      dockerfile: src/services/notification-service/FinVault.NotificationService.API/Dockerfile
    container_name: finvault-notifications
    ports:
      - "5191:8080"
    environment:
      <<: *common-env
      ConnectionStrings__NotificationDb: "Server=sqlserver,1433;Database=finvault_notifications;User Id=${DB_USERNAME};Password=${DB_PASSWORD};TrustServerCertificate=True"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-smtp.gmail.com}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__FromEmail: "${EMAIL_FROM}"
      Email__FromName: "FinVault"
      Email__Username: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
    depends_on: *sql-depends

  ocelot-gateway:
    build:
      context: .
      dockerfile: src/services/ocelot-gateway/FinVault.OcelotGateway.API/Dockerfile
    container_name: finvault-gateway
    ports:
      - "5001:8080"
    environment:
      <<: *common-env
    depends_on:
      - identity-service
      - card-service
      - payment-service
      - notification-service

volumes:
  sqlserver_data:
  rabbitmq_data:
