# SonarQube Configuration for FinVault
sonar.projectKey=finvault
sonar.projectName=FinVault
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/*.Tests/**

# Language
sonar.language=cs

# Test files
sonar.tests=src
sonar.test.inclusions=**/*.Tests/**,**/*Test.cs,**/*Tests.cs

# Coverage
sonar.coverage.exclusions=**/Program.cs,**/*Middleware.cs,**/*Exception.cs
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Quality Gate
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8
sonar.cs.roslyn.ignoreIssues=false