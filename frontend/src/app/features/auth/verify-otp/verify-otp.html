<div class="auth-wrapper">
  <div class="auth-card glass-panel text-center">
    <div class="auth-brand">
      <span class="material-icons-outlined brand-icon">security</span>
      <h2>Verify OTP</h2>
    </div>
    
    <div class="auth-header">
      <h1>Check your email</h1>
      <p>We've sent a 6-digit code to {{ email || 'your email address' }}.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage" class="error-banner">
        <span class="material-icons-outlined">error_outline</span>
        {{ errorMessage }}
      </div>

      <div *ngIf="resendMessage" class="success-banner">
        <span class="material-icons-outlined">check_circle</span>
        {{ resendMessage }}
      </div>

      <div class="form-group text-left" *ngIf="!email">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group text-left">
        <label for="otp">One-Time Password</label>
        <input type="text" id="otp" name="otp" [(ngModel)]="otp" placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 0.5em; font-size: 1.2rem;" required />
      </div>

      <button type="submit" class="auth-submit primary-btn" [disabled]="isLoading">
        <span class="material-icons-outlined spin" *ngIf="isLoading">refresh</span>
        {{ isLoading ? 'Verifying...' : 'Verify Code' }}
      </button>
    </form>
    
    <div class="auth-footer">
      Didn't receive a code? 
      <a href="javascript:void(0)" (click)="resendOtp()" [class.disabled]="isResending">
        {{ isResending ? 'Sending...' : 'Resend Code' }}
      </a>
    </div>
  </div>
</div>
