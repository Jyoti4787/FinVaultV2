<div class="auth-wrapper">
  <div class="auth-card glass-panel">
    <div class="auth-brand">
      <span class="material-icons-outlined brand-icon">account_balance</span>
      <h2>FinVault</h2>
    </div>
    
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Enter your credentials to access your account.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage" class="error-banner">
        <span class="material-icons-outlined">error_outline</span>
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="you@example.com" required />
      </div>
      
      <div class="form-group">
        <div class="label-row">
          <label for="password">Password</label>
          <a routerLink="/auth/reset-password" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="auth-submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Sign up now</a>
    </div>
  </div>
</div>
