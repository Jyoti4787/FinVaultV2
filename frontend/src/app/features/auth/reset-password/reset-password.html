<div class="auth-wrapper">
  <div class="auth-card glass-panel">
    <div class="auth-brand">
      <span class="material-icons-outlined brand-icon">lock_reset</span>
      <h2>Reset Password</h2>
    </div>
    
    <div class="auth-header">
      <h1>Forgot your password?</h1>
      <p>Enter your email address to receive a secure reset link.</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage" class="error-banner">
        <span class="material-icons-outlined">error_outline</span>
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-banner" style="background-color: rgba(46, 138, 92, 0.1); color: var(--success); padding: 0.75rem; border-radius: 6px; display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 500;">
        <span class="material-icons-outlined">check_circle</span>
        {{ successMessage }}
      </div>

      <div class="form-group" *ngIf="!successMessage">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="you@example.com" required />
      </div>

      <button type="submit" class="auth-submit primary-btn" [disabled]="isLoading" *ngIf="!successMessage">
        <span class="material-icons-outlined spin" *ngIf="isLoading">refresh</span>
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
    
    <div class="auth-footer">
      Remembered your password? <a routerLink="/auth/login">Sign in</a>
    </div>
  </div>
</div>
