<div class="page-header">
  <div>
    <h1>My Profile</h1>
    <p class="subtitle">Manage your account information and preferences.</p>
  </div>
</div>

<div class="profile-container glass-panel">
  <div *ngIf="isLoading" class="loading-state">
    <span class="material-icons-outlined spin">refresh</span> Loading profile...
  </div>

  <div *ngIf="!isLoading && user">
    <div *ngIf="errorMessage" class="error-banner">
      <span class="material-icons-outlined">error_outline</span> {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="success-banner">
      <span class="material-icons-outlined">check_circle</span> {{ successMessage }}
    </div>

    <form (ngSubmit)="updateProfile()" class="profile-form">
      <div class="form-group">
        <label>Email Address <em>(Read-only)</em></label>
        <input type="email" [value]="user.email" disabled class="disabled-input" />
      </div>

      <div class="form-row">
        <div class="form-group grid-item">
          <label>First Name</label>
          <input type="text" [(ngModel)]="profileForm.firstName" name="firstName" required />
        </div>
        <div class="form-group grid-item">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="profileForm.lastName" name="lastName" required />
        </div>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" [(ngModel)]="profileForm.phoneNumber" name="phoneNumber" placeholder="+1 (555) 000-0000" />
      </div>

      <div class="form-actions">
        <button type="submit" class="primary-btn" [disabled]="isUpdating">
          <span class="material-icons-outlined" *ngIf="isUpdating">sync</span>
          {{ isUpdating ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
