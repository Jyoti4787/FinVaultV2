<div class="page-header">
  <div>
    <h1>Request New Card</h1>
    <p class="subtitle">Complete the form below to apply for a new virtual or physical setup.</p>
  </div>
</div>

<div class="add-card-container glass-panel">
  <div *ngIf="errorMessage" class="error-banner mb-2">
    <span class="material-icons-outlined">error_outline</span> {{ errorMessage }}
  </div>

  <form class="card-form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group grid-item">
        <label>Card Issuer Network</label>
        <select [(ngModel)]="newCard.issuerName" name="issuerName" required class="select-input">
          <option value="Visa">Visa</option>
          <option value="Mastercard">Mastercard</option>
          <option value="Amex">American Express</option>
          <option value="Discover">Discover</option>
        </select>
      </div>

      <div class="form-group grid-item">
        <label>Requested Credit Limit ($)</label>
        <input type="number" [(ngModel)]="newCard.creditLimit" name="creditLimit" min="500" max="100000" required />
      </div>
    </div>

    <div class="info-block mt-2">
      <span class="material-icons-outlined info-icon">info</span>
      <p>Card limits are subject to immediate algorithmic approval based on your aggregate utilization metric. Wait times apply for limits exceeding $50k.</p>
    </div>

    <div class="form-actions mt-3">
      <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="primary-btn" [disabled]="isSubmitting">
        <span class="material-icons-outlined spin" *ngIf="isSubmitting">refresh</span>
        {{ isSubmitting ? 'Requesting...' : 'Request Card' }}
      </button>
    </div>
  </form>
</div>
